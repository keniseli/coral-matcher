name: Production Serverless Build & Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # ==========================================
  # JOB 1: TEST, ASSEMBLE & SHIP BACKEND FUNCTION
  # ==========================================
  deploy-backend:
    runs-on: ubuntu-latest
    environment: MCCR-MVP
    steps:
    - name: Checkout Repository Source Tree
      uses: actions/checkout@v4

    - name: Set up Python Environment Sandbox
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache Machine Learning Pip Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

    - name: Install Isolated Linux-CPU Core Wheels
      run: |
        cd backend
        pip install -r requirements.txt

    # NEW: Fetch model parameters on GitHub's fast runners to skip underwater cloud timeouts
    - name: Download and Bundle Model Weights Natively
      run: |
        cd backend
        python download_weights.py

#    - name: Run Automated Quality Matrix Verification Checks
#      run: |
#        cd backend
#        pytest test_main.py -v

    # Google Cloud Security Authentication Configuration
    - name: Authenticate to Google Cloud Engine
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Deploy Serverless Cloud Function Routine Container
      uses: google-github-actions/deploy-cloud-functions@v4
      timeout-minutes: 10
      with:
        name: coral-upload-pipeline
        runtime: python312
        environment: GEN_2
        memory: 1G
        source_dir: ./backend
        entry_point: process_coral_upload
        region: us-central1
        # TODO: fix this at some point eg. to allow only for authenticated users?
        ingress_settings: ALLOW_ALL
        all_users_invoker: true
        environment_variables: |
          SUPABASE_URL=${{ vars.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BUCKET_NAME=${{ vars.GCP_BUCKET_NAME }}
          GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT_ID }}

  # ==========================================
  # JOB 2: SHIP STATIC WORKSPACE FRONTEND
  # ==========================================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend # Ensures frontend deployment only triggers if backend tests pass
    environment: MCCR-MVP
    steps:
    - name: Checkout Repository Source Tree
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud Engine
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # Uploads your static index files straight to a public-facing GCS static web hosting container bucket
    - name: Synchronize Static Frontend Workspace Code Assets
      uses: google-github-actions/upload-cloud-storage@v3
      with:
        path: ./frontend
        destination: ${{ vars.GCP_STATIC_WEB_BUCKET_NAME }}
        parent: false
